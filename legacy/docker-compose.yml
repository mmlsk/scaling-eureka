version: '3.8'

services:
  life-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: life-os
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Tabasco%20.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (optional - uncomment if using HTTPS)
      # - /etc/letsencrypt/live/your-domain.com/fullchain.pem:/etc/nginx/ssl/cert.pem:ro
      # - /etc/letsencrypt/live/your-domain.com/privkey.pem:/etc/nginx/ssl/key.pem:ro
    restart: unless-stopped
    networks:
      - life-os-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  life-os-network:
    driver: bridge
