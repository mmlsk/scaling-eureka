name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true  # dependabot handles fixes; don't break CI
      - name: Run tests
        run: npm test -- --run  # vitest in non-watch mode
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          FINNHUB_NEWS_KEY: ${{ secrets.FINNHUB_NEWS_KEY }}
          NEXT_PUBLIC_OPENAQ_KEY: ${{ secrets.NEXT_PUBLIC_OPENAQ_KEY }}
          NEXT_PUBLIC_OPENUV_KEY: ${{ secrets.NEXT_PUBLIC_OPENUV_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
