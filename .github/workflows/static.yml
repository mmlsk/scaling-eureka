name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true  # dependabot handles fixes; don't break deploy
      - name: Run tests
        run: npm test -- --run  # vitest in non-watch mode
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_POLYGON_KEY: ${{ secrets.NEXT_PUBLIC_POLYGON_KEY }}
          NEXT_PUBLIC_ALPHAVANTAGE_KEY: ${{ secrets.NEXT_PUBLIC_ALPHAVANTAGE_KEY }}
          NEXT_PUBLIC_FINNHUB_KEY: ${{ secrets.NEXT_PUBLIC_FINNHUB_KEY }}
          NEXT_PUBLIC_OPENAQ_KEY: ${{ secrets.NEXT_PUBLIC_OPENAQ_KEY }}
          NEXT_PUBLIC_OPENUV_KEY: ${{ secrets.NEXT_PUBLIC_OPENUV_KEY }}
          NEXT_PUBLIC_FRED_KEY: ${{ secrets.NEXT_PUBLIC_FRED_KEY }}
          NEXT_PUBLIC_EIA_KEY: ${{ secrets.NEXT_PUBLIC_EIA_KEY }}
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
