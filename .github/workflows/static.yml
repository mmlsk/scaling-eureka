name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true  # dependabot handles fixes; don't break CI
      - name: Run tests
        run: npm test -- --run  # vitest in non-watch mode
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_POLYGON_KEY: ${{ secrets.NEXT_PUBLIC_POLYGON_KEY }}
          NEXT_PUBLIC_ALPHAVANTAGE_KEY: ${{ secrets.NEXT_PUBLIC_ALPHAVANTAGE_KEY }}
          NEXT_PUBLIC_FINNHUB_KEY: ${{ secrets.NEXT_PUBLIC_FINNHUB_KEY }}
          NEXT_PUBLIC_OPENAQ_KEY: ${{ secrets.NEXT_PUBLIC_OPENAQ_KEY }}
          NEXT_PUBLIC_OPENUV_KEY: ${{ secrets.NEXT_PUBLIC_OPENUV_KEY }}
          NEXT_PUBLIC_FRED_KEY: ${{ secrets.NEXT_PUBLIC_FRED_KEY }}
          NEXT_PUBLIC_EIA_KEY: ${{ secrets.NEXT_PUBLIC_EIA_KEY }}
