version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      supabase:
        patterns:
          - "@supabase/*"
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
      tanstack:
        patterns:
          - "@tanstack/*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
